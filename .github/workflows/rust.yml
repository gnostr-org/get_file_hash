name: Rust

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
        features_args: ["", "--no-default-features", "--features nostr"]

    steps:
    - uses: actions/checkout@v4
    - name: Build ${{ matrix.features_args }}
      run: cargo build --verbose ${{ matrix.features_args }}
    - name: Run tests ${{ matrix.features_args }}
      run: cargo test --verbose ${{ matrix.features_args }}
    - name: Run general tests ${{ matrix.features_args }}
      run: cargo test ${{ matrix.features_args }}
    - name: Run get_file_hash_core tests ${{ matrix.features_args }}
      run: cargo test -p get_file_hash_core ${{ matrix.features_args }}
    - name: Build Release ${{ matrix.features_args }}
      run: cargo build --release ${{ matrix.features_args }}
