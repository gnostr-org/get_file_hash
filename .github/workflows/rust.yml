name: Rust

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run general tests
      run: cargo test
    - name: Run general nostr tests
      run: cargo test --features nostr
    - name: Run get_file_hash_core tests
      run: cargo test -p get_file_hash_core
    - name: Run get_file_hash_core nostr tests
      run: cargo test -p get_file_hash_core --features nostr
