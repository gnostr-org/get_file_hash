[package]
name = "get_file_hash"
version = "0.1.2"
edition = "2024"
description = "A utility crate providing a procedural macro to compute and embed file hashes at compile time."
license = "MIT"
documentation = "https://github.com/gnostr-org/get_file_hash#readme"
homepage = "https://github.com/gnostr-org/get_file_hash"
repository = "https://github.com/gnostr-org/get_file_hash"

[dependencies]
get_file_hash_core = { path = "src/get_file_hash_core", version = "0.1.0" }
nostr = "0.44.2"
sha2 = "0.11.0"
get_file_hash_proc_macro = { path = "src/get_file_hash_proc_macro" }

[build-dependencies]
get_file_hash_core = { path = "src/get_file_hash_core", version = "0.1.0" }
nostr = "0.44.2"
sha2 = "0.11.0"
nostr-sdk = "0.29.0"
tokio = { version = "1", features = ["full"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
